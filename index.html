<!DOCTYPE html>
<html>
<head>
  <title>Social Media Handles</title>
  <style>
    .social-media-list {
      list-style: none;
      padding: 0;
    }
    .social-media-list li {
      display: inline-block;
      margin-right: 10px;
    }
    .social-media-list li img {
      width: 32px; /* Adjust the width as needed */
      height: 32px; /* Adjust the height as needed */
    }
	a {
      color: white; /* Change the color value to your desired color */
    }
	.responsive-banner {
 		width: 100%;       /* Ensures it spans the full width of its container */
  		height: 1360px;     /* Set a fixed or max-height that looks good to you */
 		object-fit: cover; /* Prevents the image from squishing or stretching */
  		object-position: center; /* Keeps the focal point in the middle */
   }
   .ratio-banner {
		  width: 100%;             /* Tells the image to fill the screen width */
		  aspect-ratio: 16 / 9;    /* Forces the height to automatically be 16:9 based on the width */
		  object-fit: cover;       /* Crops the image perfectly to fit the box without distorting */
		  object-position: center; /* Keeps the middle of your image in the spotlight */
		  display: block;          /* Removes tiny visual gaps under the image */
	}
  </style>
</head>
