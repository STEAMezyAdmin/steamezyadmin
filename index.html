<!DOCTYPE html>
<html>
<head>
  <title>Social Media Handles</title>
  <style>
    .social-media-list {
      list-style: none;
      padding: 0;
    }
    .social-media-list li {
      display: inline-block;
      margin-right: 10px;
    }
    .social-media-list li img {
      width: 32px; /* Adjust the width as needed */
      height: 32px; /* Adjust the height as needed */
    }
	a {
      color: white; /* Change the color value to your desired color */
    }
	.responsive-banner {
 		width: 100%;       /* Ensures it spans the full width of its container */
  		height: 1080px;     /* Set a fixed or max-height that looks good to you */
 		object-fit: cover; /* Prevents the image from squishing or stretching */
  		object-position: center; /* Keeps the focal point in the middle */
   }
  </style>
</head>
<body  bgcolor="#434046">
     <center>
	    <div class="banner-wrapper">
           <img src="banner.jpg" alt="Website Banner" class="responsive-banner">
        </div>
	    <ul class="social-media-list">
              <li><a href="https://www.facebook.com/profile.php?id=100094608903255"><img src="fb.png" alt="Facebook"></a></li>
              <li><a href="https://twitter.com/@STEAM_ezy"><img src="https://www.logo.wine/a/logo/Twitter/Twitter-Logo.wine.svg" alt="Twitter"></a></li>
              <li><a href="https://www.instagram.com/steam.ezy"><img src="https://www.logo.wine/a/logo/Instagram/Instagram-Logo.wine.svg" alt="Instagram"></a></li>
              <li><a href="https://www.youtube.com/@STEAMezy"><img src="https://www.logo.wine/a/logo/YouTube/YouTube-Logo.wine.svg" alt="Youtube"></a></li>
                 <!-- Add more social media platforms as needed -->
            </ul>
     </center>
</body>
</html>
